name: Build binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Build executable
        run: uv run --group build python scripts/build_binary.py

      - name: Package executable
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          tar -C dist -czf "release/fit-analyzer-${{ runner.os }}-${{ runner.arch }}.tar.gz" fit-analyzer

      - name: Package executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path dist\fit-analyzer.exe -DestinationPath "release\fit-analyzer-${{ runner.os }}-${{ runner.arch }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: fit-analyzer-${{ runner.os }}-${{ runner.arch }}
          path: release/*

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ls -la release-artifacts
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-artifacts/* --clobber
          else
            gh release create "$TAG_NAME" release-artifacts/* --title "$TAG_NAME" --generate-notes
          fi
